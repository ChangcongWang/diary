<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/dist/bundle.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航栏 -->
        <header class="top-bar">
            <button class="icon-button" id="settings-btn" title="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1m17.657-5.657l-4.243 4.243M6.343 17.657l4.243-4.243m0-11.314L6.343 6.343M17.657 17.657l-4.243-4.243"></path>
                </svg>
            </button>

            <div class="date-controls">
                <button class="icon-button" id="prev-day" title="前一天">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="date-picker-wrapper">
                    <input type="text" id="date-picker-input" class="date-display">
                </div>
                <button class="icon-button" id="next-day" title="后一天">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <button class="icon-button" id="sync-btn" title="同步">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2v6h-6"></path>
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                    <path d="M3 22v-6h6"></path>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                </svg>
            </button>
        </header>

        <!-- 主页面 -->
        <main class="main-content">
            <div id="entries-container"></div>
        </main>

        <!-- 设置面板 -->
        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>S3 设置</h2>
                    <button class="close-button" id="close-settings">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="s3-endpoint">Endpoint URL</label>
                        <input type="text" id="s3-endpoint" placeholder="https://s3.amazonaws.com">
                    </div>
                    <div class="form-group">
                        <label for="s3-access-key">Access Key</label>
                        <input type="password" id="s3-access-key" placeholder="你的 Access Key">
                    </div>
                    <div class="form-group">
                        <label for="s3-secret-key">Secret Key</label>
                        <input type="password" id="s3-secret-key" placeholder="你的 Secret Key">
                    </div>
                    <div class="form-group">
                        <label for="s3-bucket">Bucket Name</label>
                        <input type="text" id="s3-bucket" placeholder="你的 Bucket 名称">
                    </div>
                    <div class="form-group">
                        <label for="s3-region">Region</label>
                        <input type="text" id="s3-region" placeholder="cn-beijing">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="check-connection">检查连接</button>
                    <button class="btn-primary" id="save-settings">保存设置</button>
                </div>
            </div>
        </div>

        <!-- 加载提示 -->
        <div class="loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text" id="loading-text">同步中...</div>
        </div>

        <!-- 消息提示 -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="/dist/bundle.js"></script>
</body>
</html>
